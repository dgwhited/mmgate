server:
  listen_addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  max_body_bytes: 10485760  # 10MB

upstream:
  url: "http://localhost:8065"
  timeout: 30s
  health_path: "/api/v4/system/ping"

security:
  timestamp_tolerance: 300  # seconds (5 minutes)

clients:
  - id: "n8n-production"
    secret: "${N8N_BRIDGE_SECRET}"
    allowed_paths:
      - "/hooks/*"
    rate_limit: 60

  - id: "lambda-slashcmd"
    secret: "${LAMBDA_BRIDGE_SECRET}"
    allowed_paths:
      - "/api/v4/posts"
      - "/api/v4/commands/*"
      - "/hooks/*"
    rate_limit: 120

logging:
  level: "info"
  format: "json"
